<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="Expense.css">
    <title>Expense Tracker</title>
</head>
<body >
    
    
    <div  class="bg-1" id="homePage">
  <div>
    <div class="pt-5">
      <h1 class="heading-1" > Smart Expense Tracker</h1>
    </div >
    </div>
    <div class="d-flex flex-row justify-content-center">
    <div class="mt-5">
    <div class="heading-3 cart">
        <h3>Add Today's Expenses</h3>
        <div class="mid">
      <button  class="btn" onclick="display('Add')">Add</button>
       
    </div>
    </div>
    
    </div>
    <div class="mt-5">
    <div class="heading-3 cart">
        <h3>Total Expenses </h3>
        <div class="mid">
      <button class="btn2" onclick="display('show');showExpenses()">Show</button>
    </div>
    </div>
    
    </div>
    </div>
    </div>
    <div id="Add" style="display:none;" class="bg-2">

        <div class="pt-5 mid ">
            <h1 class="heading-1">Add Today's Expenses</h1>
        </div>
        <div class="d-flex flex-row justify-content-center mt-5">
        <div class="cart-2">
            <div class="d-flex flex-row p-2">
            <p class="cart-add">Expense Name:</p>
            <input type="text" id="EName">
            </div>
            <div class="d-flex flex-row p-2">
            <p class="cart-add">Amount:</p>
            <input type="number" id="amount">
            </div>
            <div class="d-flex flex-row p-2">
            <p class="cart-add">Category:</p>
            <select id="Category">
                <option>Food</option>
                <option>Travel</option>
                <option>Shopping</option>
            </select>
            </div>
            <div class="d-flex flex-row p-2">
            <p class="cart-add">Date:</p>
            <input type="date" id="date">
            </div>

        
        <div class="pt-5">
            
        <button  onclick="save()" class="btn ">SAVE</button>
        </div>
      </div>
    </div>
        <div class="mid">
         <button onclick="back('Add')"  class="btn">BACK</button>
         </div>
          </div>
        

    
    
    <div id="show" style="display:none;" class="bg-2">
        <div >
            <h1 class="mid p-5 " style="color:#ffc107; font-style:italic;font-family:'roboto'; font-size:55px; font-weight:bold;">Show Total Money Spent </h1>
        </div>
       
        <div class="d-flex flex-row justify-content-center">
       <div id="expensesList">
        <h2 class="text-center mb-4">
   <span style="color:#ffffff;font-weight:bold;">
    Total Expenses:
</span>

<span id="grandTotal"
      style="color:#dc3545;font-weight:bold;">
      ₹0
</span>
</h2>

    <table class="table table-striped table-hover table-light">

       <thead>
    <tr>
        <th>Expense Name</th>
        <th>Amount</th>
        <th>Category</th>
        <th>Date</th>
        <th>Action</th>
    </tr>
</thead>

        <tbody id="tableBody">

        </tbody>

    </table>

</div>
         
        </div>
        <div class="mid">
        <button class="btn" onclick="back('show')">BACK</button>
        </div>

    </div>
      <script src="script.js">
      
    </script>
</body>
</html>
